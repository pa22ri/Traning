<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card</title>
    <link rel="stylesheet" href="product.css">
</head>
<body>

    <div class="card">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRSPDBiUhUiRpakEWpdAmD4BKPegtsizeyllCX7oISFSA&s=10"
            alt="Samsung Galaxy Phone">

        <div class="content">
            <h2>Samsung Galaxy S25 Ultra</h2>

            <p class="description">
                Experience flagship performance with a stunning AMOLED display,
                Snapdragon processor, AI camera, and long-lasting battery.
            </p>

            <h3 class="price">₹1,29,999</h3>

            <button>Buy Now</button>
            <br><br>
            <button id="buttons">Next Product</button>
        </div>
    </div>
    <script src="product.js"></script>
</body>
</html>
