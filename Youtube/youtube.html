<!DOCTYPE html>
<html>
<head>
    <title>YouTube Clone</title>
    <link rel="stylesheet" href="youtube.css">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <!-- Navbar -->
    <div class="navbar">
        <div class="menu">
            <i class="fa-solid fa-bars"></i>
            <span class="logo">YouTube</span>
        </div>

        <div class="search">
            <input type="text" placeholder="Search">
            <button><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>

        <div class="profile">
            <i class="fa-solid fa-bell"></i>
            <div class="circle">P</div>
        </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
        <div>🏠 Home</div>
        <div>🎬 Shorts</div>
        <div>📺 Subscriptions</div>
        <div>🕒 History</div>
        <div>👍 Liked Videos</div>
    </div>

    <!-- Main Content -->
    <div class="content">

        <div class="category">All</div>
        <div class="category">Music</div>
        <div class="category">Movies</div>
        <div class="category">Live</div>

        <br><br>

        <div class="video-card">
                <iframe
                    width="320"
                    height="180"
                    src="https://www.youtube.com/embed/BsDoLVMnmZs"
                    allowfullscreen>
                </iframe>
                <h3>Video Title</h3>
                <p>Channel Name</p>
        </div>        
        <div class="video-card">
            <iframe
                width="320"
                height="180"
                src="https://www.youtube.com/embed/ZxKM3DCV2kE"
                allowfullscreen>
                </iframe>

            <h3>Video Title</h3>
            <p>Channel Name</p>
        </div>

        <div class="video-card">
            <iframe
                width="320"
                height="180"
                src="https://www.youtube.com/embed/RjIDj3XdlJo"
                allowfullscreen>
                </iframe>

            <h3>Video Title</h3>
            <p>Channel Name</p>
        </div>

    </div>

</body>
</html>
